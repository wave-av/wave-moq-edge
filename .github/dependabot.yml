version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
    open-pull-requests-limit: 5
    reviewers:
      - 'wave-av/oss-maintainers'
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    groups:
      cloudflare:
        patterns:
          - 'wrangler'
          - '@cloudflare/*'
      typescript:
        patterns:
          - 'typescript'
          - '@types/*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
    open-pull-requests-limit: 3
    labels:
      - 'github-actions'
    commit-message:
      prefix: 'ci(deps)'
      include: 'scope'
