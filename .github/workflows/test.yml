name: test (typecheck + vitest)

# Typechecks the Worker and runs the hermetic MoQ wire-codec + relay unit tests
# (__tests__/moq-wire.test.ts, __tests__/moq-relay.test.ts). These are pure, network-free tests of
# the draft-ietf-moq-transport-18 serialization + the publish/subscribe fan-out state machine, so
# they gate every change to the protocol code without needing any CF runtime. No untrusted input is
# interpolated into any run: step.

on:
  push:
    branches: [main, master, staging]
    paths:
      - "src/**"
      - "*.ts"
      - "__tests__/**"
      - "package.json"
      - "tsconfig.json"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "src/**"
      - "*.ts"
      - "__tests__/**"
      - "package.json"
      - "tsconfig.json"
      - ".github/workflows/test.yml"
  workflow_dispatch:

concurrency:
  group: test-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read  # required to pull @wave-av/spoke-chassis from GitHub Packages

jobs:
  test:
    name: typecheck + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit # npm registry only
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@wave-av"

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (hermetic — wire codec + relay)
        run: npm test
