name: Lint

# Runs ESLint (flat config, typescript-eslint) on the MoQ edge Worker. Pure static checks: no
# network, no CF runtime, no untrusted input interpolated into any run: step. Typecheck + unit
# tests are owned by test.yml (which already gates every source-touching PR).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: read # pull @wave-av/content-hash (+ spoke-chassis) from GitHub Packages

concurrency:
  group: lint-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: eslint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit # npm registry only
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # auth GitHub Packages (@wave-av/*) via the committed .npmrc
      - run: npm run lint
