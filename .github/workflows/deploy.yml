name: deploy

# Env-aware auto-deploy for the spoke chassis. Inherits the proven wave-dispatch / wave-gateway
# pattern with one addition: staging vs production split by branch.
#
#   push to main             → wrangler deploy --env production  (<proto>.wave.online)
#   push to branch staging   → wrangler deploy --env staging     (<proto>.staging.wave.online)
#
# Every spoke spawned from this chassis inherits this workflow for free. Two repo secrets are
# required to actually deploy: CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID + the spoke's own product-specific secrets
# set via `wrangler secret put` (see wrangler.toml SECRETS block). When CLOUDFLARE_API_TOKEN is
# absent the workflow no-ops with a notice (idempotent-resilient pattern).

on:
  push:
    branches: [main, master, staging]
    paths:
      - "src/**"
      - "wrangler.toml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      env:
        description: "Deploy environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - name: install
        run: npm ci

      # Derive deploy target from the trigger. `github.ref_name` is the branch (push) or input env
      # (workflow_dispatch). For push triggers we map branch → env; for workflow_dispatch the input
      # IS the env. Either way, GITHUB_OUTPUT only carries one of two literal strings ("staging" or
      # "production") — no untrusted shell expansion. Validated by the case expression.
      - name: resolve target env
        id: target
        env:
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ github.event.inputs.env }}
        run: |
          case "$EVENT_NAME" in
            workflow_dispatch)
              case "$INPUT_ENV" in
                staging|production) ENV_NAME="$INPUT_ENV" ;;
                *) echo "::error::workflow_dispatch input env must be staging or production"; exit 1 ;;
              esac
              ;;
            push)
              case "$REF_NAME" in
                main|master) ENV_NAME="production" ;;
                staging)     ENV_NAME="staging" ;;
                *) echo "::error::push from unexpected branch $REF_NAME"; exit 1 ;;
              esac
              ;;
            *) echo "::error::unsupported trigger $EVENT_NAME"; exit 1 ;;
          esac
          echo "env=$ENV_NAME" >> "$GITHUB_OUTPUT"
          echo "Deploying to: $ENV_NAME"

      - name: token gate
        id: gate
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::CLOUDFLARE_API_TOKEN unset — skipping CD"
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: deploy worker
        if: steps.gate.outputs.deploy == 'true'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0  # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # account_id was removed from the public wrangler.toml; wrangler reads it
          # from this secret at deploy time (CLOUDFLARE_ACCOUNT_ID) instead.
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env ${{ steps.target.outputs.env }}
  # PREVENT-AT-DEPLOY (#85/OBS-F10): wire this spoke's SENTRY_DSN via foundation's reusable obs-wire
  # workflow so notify.ts is never dark. Own job (needs: deploy + if: always()) so a wiring miss can
  # NEVER red the deploy job above; the daily sentry-coverage drift check (#78) is the backstop. No
  # CF/Sentry creds here — obs-wire pulls them from Doppler wave/prd; we pass only org DOPPLER_TOKEN +
  # the issue-ops bot App creds (obs-wire mints a short-lived foundation-read token to fetch the SSoT
  # wire script from the PRIVATE foundation repo; the caller's GITHUB_TOKEN can't).
  wire-obs:
    needs: deploy
    if: always()
    uses: wave-av/wave-foundation/.github/workflows/obs-wire.yml@e75987e59d7894ae9e5336ab54439ac12fc35ee7
    with:
      project_slug: wave-moq-edge
      workers: moq-edge-production moq-edge-staging moq-demo-staging wave-moq-spoke
      foundation_ref: e75987e59d7894ae9e5336ab54439ac12fc35ee7
    secrets:
      doppler_token: ${{ secrets.DOPPLER_TOKEN }}
      bot_app_id: ${{ secrets.BOT_ISSUE_OPS_APP_ID }}
      bot_private_key: ${{ secrets.BOT_ISSUE_OPS_PRIVATE_KEY }}