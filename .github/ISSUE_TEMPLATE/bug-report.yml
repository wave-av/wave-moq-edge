name: Bug report
description: Something isn't working with moq-edge
title: '[bug] '
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing. moq-edge is a transport relay — bug reports for
        the relay itself go here. For your own client/encoder bugs, please
        debug there first and include a minimal reproduction below.

  - type: textarea
    id: description
    attributes:
      label: What happened
      description: Plain-English description. Skip the title repetition.
      placeholder: 'When I publish a track at 60fps and subscribe from 4 regions, the third subscriber drops the first 200ms of frames.'
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        Curl commands, sample payloads, or a code snippet. The smaller the better.
        If you cannot share publicly, put the bare-minimum context here and email
        security@wave.online for the rest.
      render: shell
    validations:
      required: true

  - type: input
    id: moq-draft
    attributes:
      label: MoQ draft version
      description: 'Run: curl https://your-relay/health | jq -r .moq_draft'
      placeholder: draft-07
    validations:
      required: true

  - type: input
    id: client
    attributes:
      label: Client implementation
      description: Which MoQ client are you using?
      placeholder: 'moqtail-client v0.4 / Meta MoQ Reference / custom WebTransport'
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relay logs
      description: 'Run: pnpm wrangler tail moq-edge-production --format json | grep <track-id>'
      render: json

  - type: dropdown
    id: severity
    attributes:
      label: Severity (your assessment)
      options:
        - 'P3 — minor / cosmetic'
        - 'P2 — degraded but workable'
        - 'P1 — blocked on a use case'
        - 'P0 — production outage'
      default: 1
