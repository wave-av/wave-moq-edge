name: Spec compliance / interop report
description: moq-edge behavior diverges from IETF draft-ietf-moq-transport-NN
title: '[spec] '
labels: ['spec-compliance', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Spec compliance reports are the highest-value contributions to this repo.
        We track each draft revision separately. If you found a divergence, please
        cite the section + paragraph that's being violated.

  - type: input
    id: draft
    attributes:
      label: Draft version observed against
      placeholder: 'draft-ietf-moq-transport-07 §6.4.1'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior (per spec)
      description: Quote or paraphrase the spec section.
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What moq-edge actually did. Include the relevant frame/control message bytes if applicable.
      render: text
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal interop test or wireshark capture description.
      render: shell

  - type: input
    id: client
    attributes:
      label: Reference client used
      placeholder: 'moqtail-client / Cloudflare moq-rs / Meta MoQ-rs / custom'
