#:schema node_modules/wrangler/config-schema.json
name = "moq-edge"
main = "index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
# account_id is supplied by the CLOUDFLARE_ACCOUNT_ID environment variable at
# deploy time (CI secret) — kept out of the public tree.

# WAVE MoQ Edge Relay — IETF MoQ Transport over WebTransport (HTTP/3)
# Advertises preferred=draft-18 with negotiation matrix accepting down to draft-07.
# Customer encoders publish via POST /v1/publish/<namespace>/<track>
# Viewers subscribe via WebTransport at /v1/subscribe/<namespace>/<track>
# State + fan-out lives in MoqSession Durable Object (one per session)
#
# ── Binding provisioning (Phase-B, 2026-05-29) ──────────────────────────────
# All CF resources provisioned + IDs pasted below. Worker is now deploy-ready
# (was dry-run-only). KV namespaces created via CF API; R2 buckets pre-existing.
#   MOQ_TRACK_REGISTRY_dev         = 6caca0dd121744eb829971ce6293d8b3
#   MOQ_TRACK_REGISTRY_staging     = 9d6a9ddfcc89478991df8ea1db95b8ba
#   MOQ_TRACK_REGISTRY_production  = 368824b7a9ba4dbf9d4ce31128c42cd6
#   wave-moq-recordings — the single R2 recordings bucket (acct d674452f; the -staging/-production
#     variants were never created, so all envs bind this one. Tenants are kept apart by the org-prefixed
#     key `${org}/recordings/…`, not by bucket. See recording-writer.ts / register-recording.ts.)
# Routes still live under [env.staging] / [env.production] (not top-level) —
# top-level config is dev/dry-run only so `wrangler dev` works without claiming
# a live hostname.

[observability]
enabled = true
head_sampling_rate = 1.0

# Top-level (used by `wrangler dev` + `wrangler deploy --dry-run`):
[[durable_objects.bindings]]
name = "MOQ_SESSIONS"
class_name = "MoqSessionDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MoqSessionDO"]

[[kv_namespaces]]
binding = "MOQ_TRACK_REGISTRY"
id = "6caca0dd121744eb829971ce6293d8b3"  # MOQ_TRACK_REGISTRY_dev (top-level = wrangler dev / dry-run)

[[r2_buckets]]
binding = "MOQ_RECORDINGS"
bucket_name = "wave-moq-recordings"  # ✓ provisioned (dev/dry-run)

# Production
[env.production]
name = "moq-edge-production"
route = { pattern = "moq.wave.online/*", zone_name = "wave.online" }

[env.production.vars]
ENVIRONMENT = "production"
MOQ_DRAFT_VERSION = "18"
MOQ_DRAFT_SUPPORTED = "18,17,16,15,14,13,12,11,10,9,8,7"
MAX_SUBSCRIBERS_PER_TRACK = "10000"
MAX_OBJECT_SIZE_BYTES = "16777216"  # 16 MiB
LOG_LEVEL = "info"
# wave-token-v1 + moq:read/moq:write SCOPE enforcement on publish/subscribe. OFF by default — flipping
# it on is a behavioral change to the live relay (rejects unauthenticated/unscoped clients), so it's an
# explicit operator opt-in (task #288). ON: publish requires moq:write, subscribe requires moq:read on
# the gateway-injected x-wave-scopes principal; anonymous publish/subscribe is denied. DO NOT flip here.
MOQ_REQUIRE_AUTH = "false"
# Slice B single-instance dedup activation (SB-P2.6). With the WAVE_STORAGE_METER service binding present
# (below) AND a provisioned recording (org + gateway + token + bucket), a recording finalize hashes on
# write and dedups per-org via the one canonical D1 index in wave-storage-meter. Off → plain SessionRecorder
# (byte-identical prior behavior). The fail-safe writer keeps the object on any dedup error — never drops it.
MOQ_DEDUP = "1"
MOQ_CACHED_GROUPS = "3"  # late-joiner cache depth (recent groups replayed to new subscribers)
# #284 usage emit → gateway #236 ingest. GATEWAY_BASE_URL is a public var; WAVE_SERVICE_TOKEN is a SECRET
# set out-of-band: `wrangler secret put WAVE_SERVICE_TOKEN --env production`. The emit stays INERT until
# BOTH are present AND a publisher carries a gateway-injected x-wave-org — so this changes nothing on the
# live relay until the operator provisions the secret (pairs with the gateway USAGE_INGEST flip, #263).
GATEWAY_BASE_URL = "https://api.wave.online"
# Recording write path: the bucket NAME register sends to the gateway (the R2 binding doesn't expose it).
# MUST match the env.production MOQ_RECORDINGS binding below. Recording stays INERT until WAVE_SERVICE_TOKEN
# is provisioned (wrangler secret put) AND a publisher carries a gateway-injected x-wave-org.
MOQ_RECORDINGS_BUCKET = "wave-moq-recordings"

[[env.production.durable_objects.bindings]]
name = "MOQ_SESSIONS"
class_name = "MoqSessionDO"

[[env.production.kv_namespaces]]
binding = "MOQ_TRACK_REGISTRY"
id = "368824b7a9ba4dbf9d4ce31128c42cd6"  # MOQ_TRACK_REGISTRY_production

[[env.production.r2_buckets]]
binding = "MOQ_RECORDINGS"
bucket_name = "wave-moq-recordings"  # ✓ the only moq bucket that exists (acct d674452f); -production never created

# Slice B B3/B4 single-instance dedup (SB-P2): cross-worker RPC to wave-storage-meter's canonical D1
# dedup index (entrypoint DedupRpc). Binding present ≠ active — dedup stays INERT until MOQ_DEDUP="1" is
# set (the SB-P2.6 crossing). Deploy ORDER at P2.6: deploy wave-storage-meter (DedupRpc) FIRST, then this
# worker, THEN flip MOQ_DEDUP. The binding is never invoked while the flag is unset.
[[env.production.services]]
binding = "WAVE_STORAGE_METER"
service = "wave-storage-meter"
entrypoint = "DedupRpc"

# Staging
[env.staging]
name = "moq-edge-staging"
route = { pattern = "moq.staging.wave.online/*", zone_name = "wave.online" }

[env.staging.vars]
ENVIRONMENT = "staging"
MOQ_DRAFT_VERSION = "18"
MOQ_DRAFT_SUPPORTED = "18,17,16,15,14,13,12,11,10,9,8,7"
MAX_SUBSCRIBERS_PER_TRACK = "1000"
MAX_OBJECT_SIZE_BYTES = "16777216"
LOG_LEVEL = "debug"
MOQ_REQUIRE_AUTH = "false"  # explicit operator opt-in; see production note above
MOQ_CACHED_GROUPS = "3"
# #284 usage emit (see production note). WAVE_SERVICE_TOKEN secret: `wrangler secret put WAVE_SERVICE_TOKEN --env staging`.
GATEWAY_BASE_URL = "https://api.staging.wave.online"
# Shares the single existing moq bucket (no -staging bucket exists; staging recording is inert pre-GA).
MOQ_RECORDINGS_BUCKET = "wave-moq-recordings"

[[env.staging.durable_objects.bindings]]
name = "MOQ_SESSIONS"
class_name = "MoqSessionDO"

[[env.staging.kv_namespaces]]
binding = "MOQ_TRACK_REGISTRY"
id = "9d6a9ddfcc89478991df8ea1db95b8ba"  # MOQ_TRACK_REGISTRY_staging

[[env.staging.r2_buckets]]
binding = "MOQ_RECORDINGS"
bucket_name = "wave-moq-recordings"  # the only moq bucket that exists (acct d674452f); -staging never created

# Slice B dedup binding (see production note). INERT until MOQ_DEDUP="1"; staging recording is inert pre-GA.
[[env.staging.services]]
binding = "WAVE_STORAGE_METER"
service = "wave-storage-meter"
entrypoint = "DedupRpc"
