#:schema node_modules/wrangler/config-schema.json
name = "moq-edge"
main = "index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "REPLACE_WITH_YOUR_CF_ACCOUNT_ID"

# WAVE MoQ Edge Relay — IETF MoQ Transport over WebTransport (HTTP/3)
# Advertises preferred=draft-17 with negotiation matrix accepting down to draft-07.
# Customer encoders publish via POST /v1/publish/<namespace>/<track>
# Viewers subscribe via WebTransport at /v1/subscribe/<namespace>/<track>
# State + fan-out lives in MoqSession Durable Object (one per session)

[observability]
enabled = true
head_sampling_rate = 1.0

# Top-level (used by `wrangler dev`):
[[durable_objects.bindings]]
name = "MOQ_SESSIONS"
class_name = "MoqSessionDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MoqSessionDO"]

[[kv_namespaces]]
binding = "MOQ_TRACK_REGISTRY"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[[r2_buckets]]
binding = "MOQ_RECORDINGS"
bucket_name = "REPLACE_WITH_YOUR_R2_BUCKET"

# Production
[env.production]
name = "moq-edge-production"
route = { pattern = "moq-edge.wave.online/*", zone_name = "wave.online" }

[env.production.vars]
ENVIRONMENT = "production"
MOQ_DRAFT_VERSION = "17"
MOQ_DRAFT_SUPPORTED = "17,16,15,14,13,12,11,10,9,8,7"
MAX_SUBSCRIBERS_PER_TRACK = "10000"
MAX_OBJECT_SIZE_BYTES = "16777216"  # 16 MiB
LOG_LEVEL = "info"

[[env.production.durable_objects.bindings]]
name = "MOQ_SESSIONS"
class_name = "MoqSessionDO"

[[env.production.kv_namespaces]]
binding = "MOQ_TRACK_REGISTRY"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[[env.production.r2_buckets]]
binding = "MOQ_RECORDINGS"
bucket_name = "REPLACE_WITH_YOUR_R2_BUCKET"

# Staging
[env.staging]
name = "moq-edge-staging"
route = { pattern = "moq-edge-staging.wave.online/*", zone_name = "wave.online" }

[env.staging.vars]
ENVIRONMENT = "staging"
MOQ_DRAFT_VERSION = "17"
MOQ_DRAFT_SUPPORTED = "17,16,15,14,13,12,11,10,9,8,7"
MAX_SUBSCRIBERS_PER_TRACK = "1000"
MAX_OBJECT_SIZE_BYTES = "16777216"
LOG_LEVEL = "debug"

[[env.staging.durable_objects.bindings]]
name = "MOQ_SESSIONS"
class_name = "MoqSessionDO"

[[env.staging.kv_namespaces]]
binding = "MOQ_TRACK_REGISTRY"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[[env.staging.r2_buckets]]
binding = "MOQ_RECORDINGS"
bucket_name = "REPLACE_WITH_YOUR_R2_BUCKET"
