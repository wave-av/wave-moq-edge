#:schema node_modules/wrangler/config-schema.json
name = "moq-edge"
main = "index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
# wave-av Cloudflare account (canonical; set during Phase-A canonical-flip).
account_id = "d674452f756fe46885a0d6ce7bc23f0a"

# WAVE MoQ Edge Relay — IETF MoQ Transport over WebTransport (HTTP/3)
# Advertises preferred=draft-17 with negotiation matrix accepting down to draft-07.
# Customer encoders publish via POST /v1/publish/<namespace>/<track>
# Viewers subscribe via WebTransport at /v1/subscribe/<namespace>/<track>
# State + fan-out lives in MoqSession Durable Object (one per session)
#
# ── Binding provisioning (Phase-B, 2026-05-29) ──────────────────────────────
# All CF resources provisioned + IDs pasted below. Worker is now deploy-ready
# (was dry-run-only). KV namespaces created via CF API; R2 buckets pre-existing.
#   MOQ_TRACK_REGISTRY_dev         = 6caca0dd121744eb829971ce6293d8b3
#   MOQ_TRACK_REGISTRY_staging     = 9d6a9ddfcc89478991df8ea1db95b8ba
#   MOQ_TRACK_REGISTRY_production  = 368824b7a9ba4dbf9d4ce31128c42cd6
#   wave-moq-recordings{,-staging,-production} — R2 buckets (all exist)
# Routes still live under [env.staging] / [env.production] (not top-level) —
# top-level config is dev/dry-run only so `wrangler dev` works without claiming
# a live hostname.

[observability]
enabled = true
head_sampling_rate = 1.0

# Top-level (used by `wrangler dev` + `wrangler deploy --dry-run`):
[[durable_objects.bindings]]
name = "MOQ_SESSIONS"
class_name = "MoqSessionDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MoqSessionDO"]

[[kv_namespaces]]
binding = "MOQ_TRACK_REGISTRY"
id = "6caca0dd121744eb829971ce6293d8b3"  # MOQ_TRACK_REGISTRY_dev (top-level = wrangler dev / dry-run)

[[r2_buckets]]
binding = "MOQ_RECORDINGS"
bucket_name = "wave-moq-recordings"  # ✓ provisioned (dev/dry-run)

# Production
[env.production]
name = "moq-edge-production"
route = { pattern = "moq.wave.online/*", zone_name = "wave.online" }

[env.production.vars]
ENVIRONMENT = "production"
MOQ_DRAFT_VERSION = "17"
MOQ_DRAFT_SUPPORTED = "17,16,15,14,13,12,11,10,9,8,7"
MAX_SUBSCRIBERS_PER_TRACK = "10000"
MAX_OBJECT_SIZE_BYTES = "16777216"  # 16 MiB
LOG_LEVEL = "info"

[[env.production.durable_objects.bindings]]
name = "MOQ_SESSIONS"
class_name = "MoqSessionDO"

[[env.production.kv_namespaces]]
binding = "MOQ_TRACK_REGISTRY"
id = "368824b7a9ba4dbf9d4ce31128c42cd6"  # MOQ_TRACK_REGISTRY_production

[[env.production.r2_buckets]]
binding = "MOQ_RECORDINGS"
bucket_name = "wave-moq-recordings-production"  # ✓ provisioned

# Staging
[env.staging]
name = "moq-edge-staging"
route = { pattern = "moq.staging.wave.online/*", zone_name = "wave.online" }

[env.staging.vars]
ENVIRONMENT = "staging"
MOQ_DRAFT_VERSION = "17"
MOQ_DRAFT_SUPPORTED = "17,16,15,14,13,12,11,10,9,8,7"
MAX_SUBSCRIBERS_PER_TRACK = "1000"
MAX_OBJECT_SIZE_BYTES = "16777216"
LOG_LEVEL = "debug"

[[env.staging.durable_objects.bindings]]
name = "MOQ_SESSIONS"
class_name = "MoqSessionDO"

[[env.staging.kv_namespaces]]
binding = "MOQ_TRACK_REGISTRY"
id = "9d6a9ddfcc89478991df8ea1db95b8ba"  # MOQ_TRACK_REGISTRY_staging

[[env.staging.r2_buckets]]
binding = "MOQ_RECORDINGS"
bucket_name = "wave-moq-recordings-staging"  # ✓ provisioned
